# Native base theme = dark slate-950 (the app's default). The in-app theme
# toggle (top-right of the header) restyles surfaces/charts via CSS. NOTE:
# st.dataframe and st.data_editor grids follow THIS base theme and can't be
# flipped by CSS, so they stay dark-styled even in light mode — a known
# Streamlit limitation.
[theme]
base = "dark"
primaryColor = "#F59E0B"
backgroundColor = "#0C0A09"
secondaryBackgroundColor = "#1C1917"
textColor = "#FAFAF9"
font = "sans serif"
