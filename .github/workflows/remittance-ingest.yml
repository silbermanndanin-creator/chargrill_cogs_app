name: Remittance ingest

# Reads new platform payment documents Power Automate dropped into the Supabase bucket
# (remittance/<platform>/...) — Hampr remittance advices, Yordar RGIs, Eat First RCTIs —
# extracts them with Claude, and writes the platform_remittances table the app matches
# against catering_orders to show outstanding $ per platform. Runs every 15 min
# (staggered from the catering ingest); also runnable manually from the Actions tab.
#
# Requires repo secrets (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_KEY   (same as the digest)
#   ANTHROPIC_API_KEY            (for Claude extraction)
# Optional:
#   SUPABASE_BUCKET              (the Storage bucket name; defaults to "invoices")

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

# Don't let two ingest runs overlap (they'd both try to move the same files).
concurrency:
  group: remittance-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install supabase anthropic pandas pydantic pillow
      - name: Ingest remittances
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: python remittance_ingest.py
