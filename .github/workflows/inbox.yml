name: Invoice inbox

# Reads invoices that Power Automate dropped into the Supabase 'invoice_inbox'
# storage bucket, extracts them with Claude Vision, and saves them to the app —
# every ~15 minutes. Run it on demand any time from the Actions tab ("Run workflow").
#
# Requires repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL, SUPABASE_KEY (the service_role key), ANTHROPIC_API_KEY
#
# Note: GitHub may delay scheduled runs by a few minutes under load — that's fine,
# the inbox is idempotent and the next run catches anything left.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Never let two ingests overlap (a busy run can exceed 15 min) — that would risk
# reading the same file twice. A new run waits for the in-flight one to finish.
concurrency:
  group: invoice-inbox
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install anthropic supabase pandas pydantic Pillow
      - name: Ingest inbox
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python inbox_ingest.py
